<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音为画解 · 心灵漂流 v2.0</title>
    <!-- 引入 Bmob SDK -->
    <script src="https://cdn.jsdelivr.net/npm/bmob-js-sdk@2.2.5/dist/Bmob-2.2.5.min.js"></script>
    <style>
        :root { --navy-blue: #003366; --bg: #f8fafc; }
        body, html { margin: 0; padding: 0; background: var(--bg); font-family: sans-serif; overflow: hidden; touch-action: none; }
        .app { max-width: 450px; margin: 0 auto; height: 100vh; background: white; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        
        .view { display: none; flex-direction: column; padding: 20px; flex: 1; overflow-y: auto; }
        .view.active { display: flex; }

        .btn { background: var(--navy-blue); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .btn-outline { background: white; color: var(--navy-blue); border: 1px solid var(--navy-blue); }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 10px; font-size: 14px; }

        /* 画板专属样式 */
        .canvas-container { border: 2px solid #e2e8f0; background: white; border-radius: 8px; margin-bottom: 15px; width: 100%; height: 350px; overflow: hidden; position: relative; }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; cursor: crosshair; }

        /* 工具栏 */
        .toolbar { display: flex; gap: 10px; margin-bottom: 15px; background: #f1f5f9; padding: 10px; border-radius: 8px; align-items: center; justify-content: space-between; }
        .colors, .sizes { display: flex; gap: 8px; align-items: center; }
        .color-dot { width: 25px; height: 25px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 3px rgba(0,0,0,0.3); cursor: pointer; }
        .color-dot.active { border: 2px solid black; transform: scale(1.1); }
        .size-btn { padding: 5px 10px; background: white; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .size-btn.active { background: var(--navy-blue); color: white; border-color: var(--navy-blue); }
    </style>
</head>
<body>

<div class="app">
    <!-- 主页 -->
    <div id="view-home" class="view active">
        <h2 style="text-align: center; color: var(--navy-blue); margin-top: 50px;">音为画解 · 心灵漂流 v2.0</h2>
        <p style="text-align: center; color: #666; font-size: 14px;">修复版测试</p>
        <button class="btn" onclick="switchView('view-draw')">画下心情</button>
        <button class="btn btn-outline" onclick="loadBottle()">打捞漂流瓶</button>
        <button class="btn btn-outline" style="border-color: #ccc; color: #999;" onclick="switchView('view-check')">查看回信</button>
    </div>

    <!-- 画画页 -->
    <div id="view-draw" class="view">
        <h3 style="color: var(--navy-blue); margin-top: 0;">开始你的创作</h3>
        <div class="canvas-container" id="box-draw">
            <canvas id="drawCanvas"></canvas>
        </div>
        
        <!-- 简单直接的工具栏 -->
        <div class="toolbar">
            <div class="colors" id="colors-draw">
                <div class="color-dot active" style="background: #003366;" onclick="changePen('drawCanvas', 'color', '#003366', this)"></div>
                <div class="color-dot" style="background: #e53e3e;" onclick="changePen('drawCanvas', 'color', '#e53e3e', this)"></div>
                <div class="color-dot" style="background: #3182ce;" onclick="changePen('drawCanvas', 'color', '#3182ce', this)"></div>
                <div class="color-dot" style="background: #38a169;" onclick="changePen('drawCanvas', 'color', '#38a169', this)"></div>
                <div class="color-dot" style="background: #ffffff; border-color: #ccc;" onclick="changePen('drawCanvas', 'color', '#ffffff', this)" title="橡皮擦"></div>
            </div>
            <div class="sizes" id="sizes-draw">
                <button class="size-btn" onclick="changePen('drawCanvas', 'width', 2, this)">细</button>
                <button class="size-btn active" onclick="changePen('drawCanvas', 'width', 6, this)">中</button>
                <button class="size-btn" onclick="changePen('drawCanvas', 'width', 15, this)">粗</button>
            </div>
            <button class="size-btn" style="color: red; border-color: red;" onclick="clearCanvas('drawCanvas')">清空</button>
        </div>

        <input type="text" id="sName" placeholder="匿名代号（如：成都大熊猫）">
        <input type="password" id="sPwd" placeholder="设置提取密码">
        <button class="btn" onclick="sendBottle()">投向大海</button>
        <button class="btn btn-outline" onclick="switchView('view-home')">返回</button>
    </div>

    <!-- 打捞回复页 -->
    <div id="view-reply" class="view">
        <h3 style="color: var(--navy-blue); margin-top: 0;">回应这份心情</h3>
        <div class="canvas-container" id="box-reply">
            <canvas id="replyCanvas"></canvas>
        </div>
        <div class="toolbar">
            <div class="colors" id="colors-reply">
                <div class="color-dot active" style="background: #003366;" onclick="changePen('replyCanvas', 'color', '#003366', this)"></div>
                <div class="color-dot" style="background: #d69e2e;" onclick="changePen('replyCanvas', 'color', '#d69e2e', this)"></div>
                <div class="color-dot" style="background: #ffffff; border-color: #ccc;" onclick="changePen('replyCanvas', 'color', '#ffffff', this)"></div>
            </div>
            <div class="sizes" id="sizes-reply">
                <button class="size-btn active" onclick="changePen('replyCanvas', 'width', 6, this)">中笔</button>
                <button class="size-btn" style="color: red; border-color: red;" onclick="resetReply()">还原</button>
            </div>
        </div>
        <input type="text" id="rSong" placeholder="送Ta一首歌（如：《逆光》）">
        <button class="btn" onclick="sendReply()">回复并送回</button>
        <button class="btn btn-outline" onclick="switchView('view-home')">返回</button>
    </div>

    <!-- 查看回信页 -->
    <div id="view-check" class="view">
        <h3 style="color: var(--navy-blue); margin-top: 0;">我的回响</h3>
        <input type="text" id="cName" placeholder="你的代号">
        <input type="password" id="cPwd" placeholder="你的密码">
        <button class="btn" onclick="checkMine()">查询</button>
        
        <div id="res-area" style="display: none; margin-top: 20px;">
            <p id="res-status" style="color: #003366; font-weight: bold;"></p>
            <img id="res-img" style="width: 100%; border: 1px solid #ccc; border-radius: 8px;">
            <p id="res-song" style="background: #f1f5f9; padding: 10px; border-radius: 4px; margin-top: 10px;"></p>
        </div>
        <button class="btn btn-outline" onclick="switchView('view-home')">返回</button>
    </div>
</div>

<script>
    // Bmob 初始化
    Bmob.initialize("4818d9c835a5c2e0a838da720129b480", "8ce1e6f614a8772d");

    // 全局画笔状态和缓存
    const penState = {
        'drawCanvas': { color: '#003366', width: 6 },
        'replyCanvas': { color: '#003366', width: 6 }
    };
    let activeBottleId = null;
    let bgImageCache = null; // 用于回复页的“还原”功能

    // 页面切换逻辑（包含致命Bug的修复：强制延迟获取画布大小）
    function switchView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        if (id === 'view-draw') {
            // 延迟100毫秒，等浏览器把页面显示出来后，再初始化画布
            setTimeout(() => initCanvas('drawCanvas'), 100);
        }
    }

    // 核心绘画引擎（重写版：支持鼠标和所有手机触摸屏）
    function initCanvas(id, bgImageSrc = null) {
        const canvas = document.getElementById(id);
        const container = canvas.parentElement;
        const ctx = canvas.getContext('2d');

        // 强行把画布的物理像素设置得和外部容器一样大
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        let isDrawing = false;

        function getXY(e) {
            const rect = canvas.getBoundingClientRect();
            // 兼容鼠标和触摸屏
            let clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            let clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDrawing(e) {
            e.preventDefault(); // 阻止手机屏幕滚动
            isDrawing = true;
            const pos = getXY(e);
            
            ctx.strokeStyle = penState[id].color;
            ctx.lineWidth = penState[id].width;
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            
            // 点一下也能画出一个圆点
            ctx.fillStyle = penState[id].color;
            ctx.arc(pos.x, pos.y, penState[id].width / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault(); // 阻止手机屏幕滚动
            const pos = getXY(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function stopDrawing() { isDrawing = false; }

        // 清除旧的事件监听器，防止重复绑定
        canvas.onmousedown = startDrawing;
        canvas.onmousemove = draw;
        canvas.onmouseup = stopDrawing;
        canvas.onmouseout = stopDrawing;

        canvas.ontouchstart = startDrawing;
        canvas.ontouchmove = draw;
        canvas.ontouchend = stopDrawing;
        canvas.ontouchcancel = stopDrawing;

        // 处理背景图
        if (bgImageSrc) {
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
            img.src = bgImageSrc;
        } else {
            // 给画布铺一层白色底，防止保存图片时变成黑色透明背景
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    }

    // 改变画笔粗细和颜色
    function changePen(canvasId, type, value, btnElement) {
        penState[canvasId][type] = value;
        // 视觉反馈：高亮当前选中的按钮
        const siblings = btnElement.parentElement.children;
        for (let i = 0; i < siblings.length; i++) {
            siblings[i].classList.remove('active');
        }
        btnElement.classList.add('active');
    }

    // 清空主画布
    function clearCanvas(id) {
        const canvas = document.getElementById(id);
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // 回复页的“还原”功能（撤销掉自己画的，恢复成别人的原图）
    function resetReply() {
        if (bgImageCache) initCanvas('replyCanvas', bgImageCache);
    }

    // ================= Bmob 数据库对接 =================

    // 1. 投掷
    function sendBottle() {
        const name = document.getElementById('sName').value.trim();
        const pwd = document.getElementById('sPwd').value.trim();
        const img = document.getElementById('drawCanvas').toDataURL("image/jpeg", 0.7);

        if (!name || !pwd) return alert("请填写代号和密码！");

        const query = Bmob.Query('Bottle');
        query.set("senderName", name);
        query.set("password", pwd);
        query.set("originalImage", img);
        query.set("status", 0);
        
        document.querySelector('#view-draw .btn').innerText = "发送中...";
        query.save().then(() => {
            alert("成功抛出漂流瓶！");
            document.querySelector('#view-draw .btn').innerText = "投向大海";
            clearCanvas('drawCanvas');
            switchView('view-home');
        }).catch(e => { alert("网络错误: " + e.message); document.querySelector('#view-draw .btn').innerText = "投向大海"; });
    }

    // 2. 打捞
    function loadBottle() {
        document.querySelectorAll('.btn-outline')[0].innerText = "打捞中...";
        const query = Bmob.Query('Bottle');
        query.equalTo("status", "==", 0);
        query.find().then(res => {
            document.querySelectorAll('.btn-outline')[0].innerText = "打捞漂流瓶";
            if (res.length === 0) return alert("大海里暂时没有等待回复的瓶子。");
            
            const target = res[Math.floor(Math.random() * res.length)];
            activeBottleId = target.objectId;
            bgImageCache = target.originalImage; // 缓存原图
            
            switchView('view-reply');
            // 延迟初始化回复画布并铺上原图
            setTimeout(() => initCanvas('replyCanvas', bgImageCache), 100);
        });
    }

    // 3. 回复
    function sendReply() {
        const song = document.getElementById('rSong').value.trim();
        const img = document.getElementById('replyCanvas').toDataURL("image/jpeg", 0.7);
        if (!song) return alert("送一首歌吧！");

        const query = Bmob.Query('Bottle');
        document.querySelector('#view-reply .btn').innerText = "发送中...";
        query.get(activeBottleId).then(obj => {
            obj.set("replyImage", img);
            obj.set("replySong", song);
            obj.set("status", 1);
            return obj.save();
        }).then(() => {
            alert("回复成功！");
            document.querySelector('#view-reply .btn').innerText = "回复并送回";
            switchView('view-home');
        });
    }

    // 4. 查看
    function checkMine() {
        const name = document.getElementById('cName').value.trim();
        const pwd = document.getElementById('cPwd').value.trim();
        if (!name || !pwd) return;

        document.querySelector('#view-check .btn').innerText = "查询中...";
        const query = Bmob.Query('Bottle');
        query.equalTo("senderName", "==", name);
        query.equalTo("password", "==", pwd);
        query.find().then(res => {
            document.querySelector('#view-check .btn').innerText = "查询";
            if (res.length === 0) return alert("没找到你的瓶子，检查下代号或密码？");
            
            const b = res[res.length - 1];
            document.getElementById('res-area').style.display = 'block';
            if (b.status === 1) {
                document.getElementById('res-status').innerText = "🎉 你的心情被回应了：";
                document.getElementById('res-img').src = b.replyImage;
                document.getElementById('res-song').innerText = "🎵 对方送你的歌：" + b.replySong;
            } else {
                document.getElementById('res-status').innerText = "🌊 还在漂流中，暂未被捞起...";
                document.getElementById('res-img').src = b.originalImage;
                document.getElementById('res-song').innerText = "稍后再来看看吧。";
            }
        });
    }
</script>
</body>
</html>
